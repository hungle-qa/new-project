<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>.claude Integrator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>.claude Integrator</h1>

    <section class="path-section">
      <label for="targetPath">Target project folder</label>
      <div class="path-row">
        <input type="text" id="targetPath" placeholder="/path/to/your/project" />
        <button id="browseBtn">Browse…</button>
      </div>
      <button id="scanBtn" class="primary">Scan</button>
    </section>

    <section id="resultsSection" class="hidden">
      <div id="newFilesSection">
        <h2>New files <span id="newCount" class="badge">0</span></h2>
        <ul id="newFilesList" class="file-list readonly"></ul>
      </div>

      <div id="conflictsSection">
        <h2>Conflicts <span id="conflictCount" class="badge warn">0</span></h2>
        <p class="hint">Checked = overwrite existing file. Uncheck to skip.</p>
        <div class="bulk-actions">
          <button id="checkAllBtn" class="small">Check all</button>
          <button id="uncheckAllBtn" class="small">Uncheck all</button>
        </div>
        <ul id="conflictsList" class="file-list"></ul>
      </div>

      <button id="integrateBtn" class="primary action">Confirm &amp; Integrate</button>
    </section>

    <section id="summarySection" class="hidden">
      <h2>Done</h2>
      <div id="summaryContent" class="summary-box"></div>
      <button id="resetBtn" class="small">Start over</button>
    </section>

    <div id="statusBar" class="status-bar"></div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
